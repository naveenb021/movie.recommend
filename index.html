<!DOCTYPE html>
<html>

<head>
<title>MovieFlix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1 class="logo">MovieFlix</h1>

<input id="search" placeholder="Search movies..." onkeyup="searchMovie()">

</header>


<section class="hero">

<h2>Recommended Movies</h2>

<p>Discover movies recommended by the community</p>

</section>


<section class="addMovie">

<h2>Add Movie Recommendation</h2>

<input id="name" placeholder="Movie name">
<input id="poster" placeholder="Poster image URL">
<textarea id="review" placeholder="Write your review"></textarea>

<button onclick="addMovie()">Add Movie</button>

</section>


<section>

<h2 class="title">Trending Movies</h2>

<div id="movieContainer" class="movies"></div>

</section>


<script src="script.js"></script>

</body>

</html>
